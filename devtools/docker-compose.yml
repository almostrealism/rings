services:
  rings-dev-sandbox-a:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-sandbox-a
    cpus: 8
    volumes:
      - /Users/michael/AlmostRealism/sandboxA/:/workspace/project
      - /Users/michael/AlmostRealism/sandboxA/.claude:/home/developer/.claude
      - /Users/michael/sandbox/ssh:/home/developer/.ssh
      - /Users/Shared/flowtree/tools:/Users/Shared/flowtree/tools
      - /Users/michael/Documents/AlmostRealism/models:/models:ro
      - /Users/michael/Music/Samples:/samples:ro
    working_dir: /workspace/project
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - MAVEN_OPTS=-Xmx4096m -XX:MaxMetaspaceSize=1024m
      - FLOWTREE_PORT=7766
      - FLOWTREE_NODE_ID=sandbox-a
    network_mode: host
